<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Land Cover Survey</title>
  <meta name="description" content="Pick a parcel on the map or upload a CSV. Land-cover areas per Swiss cadastral parcel by SIA 416, DIN 277, imperviousness, building zones and habitats — from official survey data, entirely in your browser.">
  <link rel="icon" type="image/svg+xml" href="assets/swiss-logo-flag.svg">

  <!-- Social / Open Graph — read by crawlers (Slack, LinkedIn, X, …) that don't follow the redirect below. -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://bbl-dres.github.io/landcover-survey/">
  <meta property="og:title" content="Land Cover Survey — area per Swiss parcel">
  <meta property="og:description" content="Pick a parcel on the map or upload a CSV. Land-cover areas per Swiss cadastral parcel by SIA 416, DIN 277, imperviousness, building zones and habitats — from official survey data, entirely in your browser.">
  <meta property="og:image" content="https://bbl-dres.github.io/landcover-survey/assets/Social2.jpg">
  <meta property="og:image:alt" content="Land Cover Survey — per-parcel land cover analysis from official Swiss survey data">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Land Cover Survey — area per Swiss parcel">
  <meta name="twitter:description" content="Pick a parcel on the map or upload a CSV. Per-parcel land-cover areas from official Swiss survey data, entirely in your browser.">
  <meta name="twitter:image" content="https://bbl-dres.github.io/landcover-survey/assets/Social2.jpg">

  <!-- The web app lives in /web/. Redirect there, preserving any query string and hash
       (e.g. ?lang=fr, ?center=...&zoom=...) so shared links keep working. -->
  <meta http-equiv="refresh" content="0; url=./web/">
  <link rel="canonical" href="./web/">
  <script>location.replace("./web/" + location.search + location.hash);</script>
</head>
<body>
  <p>Redirecting to the <a href="./web/">Land Cover Survey web app</a>…</p>
</body>
</html>
