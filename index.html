<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Land Cover Survey</title>
  <!-- The web app lives in /web/. Redirect there, preserving any query string and hash
       (e.g. ?lang=fr, ?center=...&zoom=...) so shared links keep working. -->
  <meta http-equiv="refresh" content="0; url=./web/">
  <link rel="canonical" href="./web/">
  <script>location.replace("./web/" + location.search + location.hash);</script>
</head>
<body>
  <p>Redirecting to the <a href="./web/">Land Cover Survey web app</a>…</p>
</body>
</html>
