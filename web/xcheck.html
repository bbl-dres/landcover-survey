<!DOCTYPE html>
<!-- Temporary cross-check harness (not part of the app): runs the real
     processor.js on rows served at /rows.json and POSTs the GeoJSON that
     export.js would download to /result. Delete after use. -->
<html>
<head>
  <meta charset="utf-8">
  <script src="https://unpkg.com/@turf/turf@7/turf.min.js" crossorigin="anonymous"></script>
</head>
<body>
<script type="module">
import { processRows } from "./js/processor.js";

// Mirror of export.js toFeature (not exported there).
function toFeature(row, layer) {
  const props = { layer };
  for (const [k, v] of Object.entries(row)) {
    if (!k.startsWith("_")) props[k] = v;
  }
  return { type: "Feature", geometry: row._geometry || null, properties: props };
}

function report(msg) {
  fetch("/progress", { method: "POST", body: msg }).catch(() => {});
}

(async () => {
  try {
    const rows = await (await fetch("/rows.json")).json();
    report(`start: ${rows.length} rows`);
    const results = await processRows(rows, (p) => {
      if (p.processed % 100 === 0 || p.processed === p.total) {
        report(`${p.processed}/${p.total} processed, ${p.succeeded} found`);
      }
    }, { bauzonen: true, habitat: true });
    report("processing done, serializing");
    const features = [];
    for (const p of results.parcels) features.push(toFeature(p, "parcel"));
    for (const lc of results.landcover || []) features.push(toFeature(lc, "landcover"));
    for (const bz of results.bauzonen || []) features.push(toFeature(bz, "bauzonen"));
    for (const h of results.habitat || []) features.push(toFeature(h, "habitat"));
    const body = JSON.stringify({ type: "FeatureCollection", features });
    report(`posting ${features.length} features, ${body.length} bytes`);
    await fetch("/result", { method: "POST", body });
  } catch (err) {
    await fetch("/result?error=1", { method: "POST", body: String((err && err.stack) || err) });
  }
})();
</script>
</body>
</html>
